name: Deploy FastAPI via Docker
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: fastapi-server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create .env file
        run: echo "${{ secrets.BACKEND_ENV }}" > .env

      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ secrets.REPO_USER }}/fastapi-app:latest
          platforms: linux/amd64,linux/arm64

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, fastapi-server]
    
    defaults:
      run:
        working-directory: /home/ec2-user/antelligen-backend

    steps:
      - name: GHCR Login
        run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ghcr.io/${{ secrets.REPO_USER }}/fastapi-app:latest

      - name: Stop old container
        run: |
          docker-compose down
          docker image prune -f
          docker logout
